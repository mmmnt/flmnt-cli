name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test (CGO_ENABLED=0, mirrors the release build)
        run: CGO_ENABLED=0 go test ./...

      - name: Smoke-test the release binary (fail before publishing if broken)
        run: |
          tmp=$(mktemp -d)
          CGO_ENABLED=0 go build -o "$tmp/flmnt" .
          "$tmp/flmnt" version
          out=$("$tmp/flmnt" whoami --server-url https://smoke.invalid 2>&1 || true)
          echo "$out"
          if echo "$out" | grep -qiE 'keyring|backend not available'; then
            echo "::error::keychain backend unavailable in the CGO-free release binary"
            exit 1
          fi

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish npm wrapper (@mmmnt/flmnt)
        working-directory: npm
        run: |
          npm install -g npm@latest
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
